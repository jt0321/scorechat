services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       scorechat
      POSTGRES_USER:     scorechat
      POSTGRES_PASSWORD: scorechat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  pgdata:
