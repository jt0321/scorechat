<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorechat — Score Viewer</title>
<style>
  :root {
    --bg: #1c1b19; --surface: #232220; --text: #cdccca;
    --muted: #797876; --accent: #4f98a3; --border: #393836;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
         display: flex; flex-direction: column; height: 100dvh; }

  header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.25rem;
           border-bottom: 1px solid var(--border); background: var(--surface); }
  header h1 { font-size: 1rem; font-weight: 600; color: var(--accent); }

  #controls { display: flex; gap: 0.5rem; align-items: center; padding: 0.5rem 1.25rem;
              border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  #controls label { font-size: 0.75rem; color: var(--muted); }
  #controls input[type=number] { width: 4rem; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
  button { background: var(--accent); color: #fff; border: none; border-radius: 4px;
           padding: 0.3rem 0.75rem; font-size: 0.8rem; cursor: pointer; }
  button:hover { opacity: 0.85; }

  #score-container { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
  #score-container svg { width: 100%; height: auto; background: #fff;
                         border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }

  #status { font-size: 0.75rem; color: var(--muted); padding: 0 1.25rem 0.5rem; }

  /* Highlight retrieved measure range */
  .highlighted-measure { fill: rgba(79, 152, 163, 0.18) !important; }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" style="color: var(--accent)">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </svg>
  <h1>Scorechat — Score Viewer</h1>
</header>

<div id="controls">
  <label>MEI file:</label>
  <input type="file" id="file-input" accept=".mei,.xml,.musicxml">
  <label>Measures:</label>
  <input type="number" id="m-start" value="1" min="1" title="Start measure">
  <span style="color:var(--muted)">–</span>
  <input type="number" id="m-end" value="8" min="1" title="End measure">
  <button id="render-btn">Render</button>
  <button id="load-demo">Load demo (MusicXML URL)</button>
</div>

<div id="status">Load an MEI or MusicXML file to begin.</div>
<div id="score-container"></div>

<!-- Verovio WASM -->
<script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js" defer></script>
<script>
let vrvToolkit = null;
let loadedData = null;

// Init Verovio when WASM ready
document.addEventListener("DOMContentLoaded", () => {
  if (typeof verovio !== "undefined") {
    verovio.module.onRuntimeInitialized = () => {
      vrvToolkit = new verovio.toolkit();
      setStatus("Verovio ready.");
    };
  }
});

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

// File load
document.getElementById("file-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    loadedData = ev.target.result;
    setStatus(`Loaded: ${file.name}`);
  };
  reader.readAsText(file);
});

// Demo: load a public MusicXML from IMSLP-compatible URL
document.getElementById("load-demo").addEventListener("click", async () => {
  // Bach Minuet in G from Open Corpus (public domain)
  const url = "https://raw.githubusercontent.com/music21/music21/master/music21/corpus/bach/bwv65.7.xml";
  setStatus("Fetching demo score...");
  try {
    const res = await fetch(url);
    loadedData = await res.text();
    setStatus("Demo score loaded. Click Render.");
  } catch (e) {
    setStatus("Failed to fetch demo: " + e.message);
  }
});

// Render
document.getElementById("render-btn").addEventListener("click", () => {
  if (!vrvToolkit) { setStatus("Verovio not ready yet."); return; }
  if (!loadedData) { setStatus("No score loaded."); return; }

  const mStart = parseInt(document.getElementById("m-start").value);
  const mEnd   = parseInt(document.getElementById("m-end").value);

  vrvToolkit.setOptions({
    pageWidth:  1400,
    pageHeight: 2000,
    scale:      40,
    adjustPageHeight: true,
    select: [`${mStart}-${mEnd}`],
  });

  const ok = vrvToolkit.loadData(loadedData);
  if (!ok) { setStatus("Verovio failed to parse score."); return; }

  const svg = vrvToolkit.renderToSVG(1);
  const container = document.getElementById("score-container");
  container.innerHTML = svg;
  setStatus(`Rendered mm. ${mStart}–${mEnd}`);

  // Highlight the selected measures in the SVG
  highlightMeasures(mStart, mEnd);
});

function highlightMeasures(start, end) {
  // Verovio SVG: measures have id="measure-N"
  for (let m = start; m <= end; m++) {
    const el = document.querySelector(`#measure-${m}`);
    if (el) {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      const bbox = el.getBBox();
      rect.setAttribute("x", bbox.x - 4);
      rect.setAttribute("y", bbox.y - 4);
      rect.setAttribute("width",  bbox.width  + 8);
      rect.setAttribute("height", bbox.height + 8);
      rect.setAttribute("class", "highlighted-measure");
      rect.setAttribute("rx", "3");
      el.parentNode.insertBefore(rect, el);
    }
  }
}
</script>
</body>
</html>
